# Auto-deploy to Vercel on every push.
#
# Setup (one-time):
#   1. Add a repository secret `VERCEL_TOKEN`
#      Settings → Secrets and variables → Actions → New repository secret
#      Token can be generated at https://vercel.com/account/tokens
#   2. (Optional) Disable Vercel's native Git auto-deploy to avoid double-deploys.
#      Vercel dashboard → Project → Settings → Git → Ignored Build Step → exit 0
#      (or disconnect the Git integration entirely)
#
# Org/project IDs are baked in (they're not secret — just identifiers).

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: team_aWqKd7TL89wtnLkf42t8EL0u
  VERCEL_PROJECT_ID: prj_X7jZdApKGOCs6Q2SELUhsxs9kdFu

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ github.event_name == 'push' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build ${{ github.event_name == 'push' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ github.event_name == 'push' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Comment on PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `▲ Preview deployed: ${url}`,
            });
